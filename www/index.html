<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>HelloWorld</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#121212;
            color:#fff;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            text-align:center;
            padding:20px;
        }

        h1{
            font-size:32px;
            margin-bottom:10px;
        }

        p{
            color:#ccc;
            margin-bottom:25px;
        }

        button{
            background:#00c853;
            color:#fff;
            border:none;
            padding:14px 30px;
            font-size:18px;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#00a844;
        }

        #message{
            margin-top:20px;
            color:#00e676;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Hello World 👋</h1>

    <p>Welcome to my first Cordova App.</p>

    <button onclick="showMessage()">
        Click Me
    </button>

    <div id="message"></div>

</div>

<script src="cordova.js"></script>

<script>
document.addEventListener("deviceready", function () {
    console.log("Device Ready");
}, false);

function showMessage(){
    document.getElementById("message").innerHTML =
        "🎉 Congratulations! Your Cordova app is working perfectly.";
}
</script>

</body>
</html>
